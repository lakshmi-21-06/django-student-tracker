{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Student Performance Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="{% url 'home' %}">
           🎓 Student Tracker
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'home' %}">
                       Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'student_list' %}">
                       Students
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'add_student' %}">
                       Add Student
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'add_grade' %}">
                       Add Grade
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'topper' %}">
                       Topper
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="{% url 'class_average' %}">
                       Class Average
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<footer class="bg-dark text-white text-center mt-5 p-3">
    Student Performance Tracker © 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
